<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Chef Muslim Restaurant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --gold:#C9A84C;--gold-light:#E8C97A;--gold-dark:#8B6914;
  --gold-glow:rgba(201,168,76,0.12);
  --cream:#FAF6EE;--cream-dark:#F0E8D6;
  --brown:#1E1208;--brown-mid:#2A1A0E;--brown-light:#6B4C35;
  --text:#2A1F14;--white:#FFFFFF;
  --shadow:0 4px 20px rgba(44,26,14,0.13);--radius:12px;
  --green:#1a3a22;--green-dark:#0f2018;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{background:var(--green-dark);font-family:'EB Garamond',Georgia,serif;color:var(--text);min-height:100vh;overflow-x:hidden;}

/* HERO */
.hero{background:linear-gradient(160deg,#1a3a22 0%,#0f2018 60%,#0a1a10 100%);padding:40px 20px 24px;text-align:center;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(201,168,76,0.14) 0%,transparent 70%);}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,0.5),transparent);}
.hero-badge{display:inline-block;border:1px solid rgba(201,168,76,0.35);border-radius:20px;padding:3px 14px;font-family:'Cinzel',serif;font-size:8.5px;letter-spacing:3px;color:rgba(201,168,76,0.75);text-transform:uppercase;margin-bottom:16px;position:relative;z-index:1;}
.hero-logo{width:108px;height:108px;border-radius:50%;border:2px solid rgba(201,168,76,0.6);display:inline-flex;align-items:center;justify-content:center;margin-bottom:14px;box-shadow:0 0 32px rgba(201,168,76,0.2),0 0 64px rgba(201,168,76,0.08);position:relative;z-index:1;overflow:hidden;}
.hero-logo img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.hero h1{font-family:'Cinzel',serif;font-size:22px;font-weight:700;letter-spacing:6px;color:var(--gold-light);text-transform:uppercase;position:relative;z-index:1;line-height:1;}
.hero-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;color:rgba(201,168,76,0.55);letter-spacing:3px;margin-top:4px;position:relative;z-index:1;}
.hero-rule{display:flex;align-items:center;gap:10px;max-width:180px;margin:14px auto 0;position:relative;z-index:1;}
.hero-rule span{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,0.45),transparent);}
.hero-rule i{width:4px;height:4px;background:var(--gold);transform:rotate(45deg);flex-shrink:0;}
.hero-table{display:inline-flex;align-items:center;gap:6px;background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.3);border-radius:30px;padding:5px 14px;font-family:'Cinzel',serif;font-size:9.5px;color:var(--gold-light);letter-spacing:1.5px;margin-top:12px;position:relative;z-index:1;}

/* NAV */
.nav-bar{position:sticky;top:0;z-index:200;background:rgba(15,32,24,0.97);backdrop-filter:blur(12px);border-bottom:1px solid rgba(201,168,76,0.15);display:flex;align-items:center;padding:0 10px;height:50px;gap:8px;}
.nav-scroll{flex:1;overflow-x:auto;scrollbar-width:none;display:flex;gap:0;}
.nav-scroll::-webkit-scrollbar{display:none;}
.nav-btn{font-family:'Cinzel',serif;font-size:8.5px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(201,168,76,0.4);background:none;border:none;padding:8px 11px;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all 0.2s;flex-shrink:0;}
.nav-btn.active,.nav-btn:hover{color:var(--gold-light);border-bottom-color:var(--gold);}
.cart-btn{background:linear-gradient(135deg,#7a5810,var(--gold));color:#fff;border:none;border-radius:8px;padding:7px 12px;font-family:'Cinzel',serif;font-size:10px;font-weight:700;letter-spacing:1px;cursor:pointer;display:flex;align-items:center;gap:5px;flex-shrink:0;transition:all 0.2s;white-space:nowrap;}
.cart-btn:hover{filter:brightness(1.1);}
.cart-count{background:rgba(255,255,255,0.2);border-radius:50%;width:17px;height:17px;font-size:9.5px;display:inline-flex;align-items:center;justify-content:center;font-weight:700;}

/* CONTENT */
.content{background:var(--cream);}
.section{display:none;padding-bottom:80px;animation:fadeUp 0.25s ease;}
.section.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.sec-head{background:linear-gradient(135deg,var(--brown) 0%,var(--brown-mid) 100%);padding:20px 20px 16px;text-align:center;position:relative;}
.sec-head::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1.5px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.sec-head-icon{font-size:20px;display:block;margin-bottom:5px;}
.sec-head-title{font-family:'Cinzel',serif;font-size:16px;font-weight:700;letter-spacing:4px;color:var(--gold-light);text-transform:uppercase;}

/* GRID — SQUARE CARDS (full-bleed image, info below) */
.items-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:14px 12px;}
.item-card{background:var(--white);border-radius:16px;overflow:hidden;box-shadow:0 6px 24px rgba(44,26,14,0.12);cursor:pointer;transition:transform 0.18s,box-shadow 0.18s;border:1px solid rgba(201,168,76,0.1);position:relative;display:flex;flex-direction:column;}
.item-card:active{transform:scale(0.96);}
/* image takes ~62% of card height — big & square */
.item-card-img-wrap{width:100%;aspect-ratio:1/1;position:relative;overflow:hidden;background:linear-gradient(135deg,#f2e8d5,#e5d4b8);flex-shrink:0;}
.item-card-img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.3s ease;}
.item-card:hover .item-card-img{transform:scale(1.04);}
.item-card-emoji{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:64px;}
.item-img-upload-btn{position:absolute;inset:0;background:rgba(0,0,0,0.42);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.2s;border:none;cursor:pointer;color:#fff;font-size:24px;}
.item-card:hover .item-img-upload-btn{opacity:1;}
/* info strip below image */
.item-card-body{padding:10px 11px 12px;flex:1;display:flex;flex-direction:column;gap:4px;}
.item-card-name{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:600;color:var(--brown);line-height:1.25;}
.item-ing-box{background:rgba(201,168,76,0.06);border:1px solid rgba(201,168,76,0.13);border-radius:5px;padding:4px 7px;flex:1;}
.item-ing-label{font-family:'Cinzel',serif;font-size:6.5px;letter-spacing:1.5px;color:var(--gold-dark);text-transform:uppercase;display:block;margin-bottom:2px;}
.item-ing-text{font-size:10px;color:var(--brown-light);font-style:italic;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.item-card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:2px;}
.item-price{font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:var(--gold-dark);}
.add-btn{width:32px;height:32px;background:linear-gradient(135deg,var(--gold-dark),var(--gold));border:none;border-radius:50%;color:#fff;font-size:20px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;transition:all 0.2s;flex-shrink:0;box-shadow:0 2px 8px rgba(139,105,20,0.35);}
.add-btn:hover{filter:brightness(1.15);transform:scale(1.1);}
.item-badge{position:absolute;top:8px;left:8px;background:linear-gradient(135deg,var(--gold-dark),var(--gold));color:#fff;font-family:'Cinzel',serif;font-size:7px;font-weight:700;letter-spacing:0.5px;padding:3px 9px;border-radius:20px;text-transform:uppercase;box-shadow:0 2px 8px rgba(0,0,0,0.25);z-index:2;}

/* LIST ROWS */
.items-list{padding:6px 0;}
.item-row{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid rgba(44,26,14,0.07);gap:12px;cursor:pointer;transition:background 0.15s;}
.item-row:hover,.item-row:active{background:var(--gold-glow);}
.item-row-thumb{width:62px;height:62px;border-radius:10px;flex-shrink:0;overflow:hidden;border:1px solid rgba(201,168,76,0.18);position:relative;}
.item-row-thumb img{width:100%;height:100%;object-fit:cover;}
.item-row-thumb .emoji-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:28px;background:linear-gradient(135deg,#FAF6EE,#EDE0C8);}
.item-row-thumb .row-img-upload-btn{position:absolute;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.2s;border:none;cursor:pointer;color:#fff;font-size:16px;}
.item-row:hover .row-img-upload-btn{opacity:1;}
.item-row-body{flex:1;min-width:0;}
.item-row-name{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;color:var(--brown);margin-bottom:2px;}
.item-row-desc{font-size:10.5px;color:var(--brown-light);font-style:italic;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.item-row-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.item-row-price{font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:var(--gold-dark);}
.sub-head{font-family:'Cinzel',serif;font-size:9.5px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-dark);padding:16px 16px 6px;border-bottom:1px solid rgba(201,168,76,0.15);display:flex;align-items:center;gap:8px;}
.sub-head-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(201,168,76,0.3),transparent);}

/* CART DRAWER */
.cart-overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);}
.cart-overlay.open{display:block;}
.cart-drawer{position:fixed;bottom:0;left:0;right:0;background:var(--cream);border-radius:18px 18px 0 0;z-index:600;max-height:86vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform 0.32s cubic-bezier(0.4,0,0.2,1);}
.cart-drawer.open{transform:translateY(0);}
.cart-handle{width:34px;height:4px;background:rgba(44,26,14,0.15);border-radius:2px;margin:11px auto 0;}
.cart-head{padding:13px 18px;border-bottom:1px solid rgba(44,26,14,0.08);display:flex;align-items:center;justify-content:space-between;gap:10px;}
.cart-title{font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:var(--brown);letter-spacing:2px;}
.cart-table-tag{font-family:'Cinzel',serif;font-size:9.5px;color:var(--gold-dark);background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.28);border-radius:20px;padding:3px 10px;letter-spacing:1px;}
.cart-close{width:28px;height:28px;background:var(--cream-dark);border:none;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--brown);}
.cart-scroll{flex:1;overflow-y:auto;padding:8px 0;}
.cart-item{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid rgba(44,26,14,0.06);}
.cart-item-thumb{width:42px;height:42px;border-radius:8px;flex-shrink:0;overflow:hidden;background:var(--cream-dark);}
.cart-item-thumb img{width:100%;height:100%;object-fit:cover;}
.cart-item-thumb .em{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:20px;}
.cart-item-name{flex:1;font-family:'Cormorant Garamond',serif;font-size:14.5px;font-weight:600;color:var(--brown);}
.cart-item-sub{font-size:10.5px;color:var(--brown-light);font-style:italic;}
.qty-ctrl{display:flex;align-items:center;gap:6px;}
.qty-btn{width:25px;height:25px;border-radius:50%;border:1.5px solid var(--gold);background:none;cursor:pointer;font-size:14px;font-weight:700;color:var(--gold-dark);display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.qty-btn:hover{background:var(--gold);color:#fff;}
.qty-num{font-family:'Cinzel',serif;font-size:12px;font-weight:700;color:var(--brown);min-width:17px;text-align:center;}
.cart-item-price{font-family:'Cinzel',serif;font-size:11.5px;font-weight:700;color:var(--gold-dark);min-width:44px;text-align:right;}
.cart-empty{text-align:center;padding:38px 20px;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px;color:var(--brown-light);}
.cart-footer{padding:13px 16px;border-top:2px solid rgba(201,168,76,0.18);background:#fff;}
.cart-total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px;}
.cart-total-lbl{font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;color:var(--brown-light);text-transform:uppercase;}
.cart-total-val{font-family:'Cinzel',serif;font-size:20px;font-weight:700;color:var(--brown);}
.cart-note{width:100%;padding:8px 11px;background:var(--cream);border:1px solid rgba(44,26,14,0.14);border-radius:8px;font-family:'EB Garamond',serif;font-size:13.5px;color:var(--text);outline:none;margin-bottom:10px;resize:none;}
.cart-note:focus{border-color:var(--gold);}
.order-btn{width:100%;background:linear-gradient(135deg,var(--gold-dark),var(--gold));color:#fff;border:none;border-radius:11px;padding:14px;font-family:'Cinzel',serif;font-size:12px;font-weight:700;letter-spacing:3px;cursor:pointer;transition:all 0.2s;text-transform:uppercase;}
.order-btn:hover{filter:brightness(1.08);transform:translateY(-1px);}
.order-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

/* ITEM MODAL */
.modal-overlay{display:none;position:fixed;inset:0;z-index:700;background:rgba(0,0,0,0.68);backdrop-filter:blur(5px);}
.modal-overlay.open{display:block;}
.item-modal{position:fixed;bottom:0;left:0;right:0;background:var(--cream);border-radius:18px 18px 0 0;z-index:800;max-height:80vh;overflow-y:auto;transform:translateY(100%);transition:transform 0.28s ease;}
.item-modal.open{transform:translateY(0);}
.modal-img-wrap{position:relative;}
.modal-img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block;}
.modal-emoji-ph{width:100%;aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;font-size:90px;background:linear-gradient(135deg,#f2e8d5,#e5d4b8);}
.modal-emoji-ph{width:100%;aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;font-size:80px;background:linear-gradient(135deg,#FAF6EE,#EDE0C8);}
.modal-close{position:absolute;top:12px;right:12px;width:30px;height:30px;background:rgba(0,0,0,0.42);border:none;border-radius:50%;color:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:5;}
.modal-body{padding:16px 18px 20px;}
.modal-name{font-family:'Cinzel',serif;font-size:17px;font-weight:700;color:var(--brown);margin-bottom:12px;}
.modal-ing{background:#fff;border-radius:10px;padding:11px 13px;margin-bottom:14px;border:1px solid rgba(201,168,76,0.18);}
.modal-ing-title{font-family:'Cinzel',serif;font-size:8px;letter-spacing:2px;color:var(--gold-dark);text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;gap:6px;}
.modal-ing-title::after{content:'';flex:1;height:1px;background:rgba(201,168,76,0.28);}
.modal-ing-chips{display:flex;flex-wrap:wrap;gap:5px;}
.modal-chip{background:var(--cream-dark);border:1px solid rgba(201,168,76,0.22);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--brown);font-style:italic;}
.modal-footer{display:flex;align-items:center;gap:12px;background:var(--cream);padding:12px 16px;border-top:1px solid rgba(44,26,14,0.07);position:sticky;bottom:0;}
.modal-price{font-family:'Cinzel',serif;font-size:21px;font-weight:700;color:var(--gold-dark);}
.modal-add-btn{flex:1;background:linear-gradient(135deg,var(--gold-dark),var(--gold));color:#fff;border:none;border-radius:10px;padding:12px;font-family:'Cinzel',serif;font-size:11.5px;font-weight:700;letter-spacing:2px;cursor:pointer;text-transform:uppercase;transition:all 0.2s;}
.modal-add-btn:hover{filter:brightness(1.08);}

/* TOAST */
.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--brown);color:var(--gold-light);font-family:'Cinzel',serif;font-size:10.5px;letter-spacing:1.5px;padding:10px 20px;border-radius:30px;border:1px solid rgba(201,168,76,0.4);opacity:0;transition:all 0.28s;z-index:900;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ORDER CONFIRM */
.order-confirm{display:none;position:fixed;inset:0;z-index:1000;background:linear-gradient(160deg,#1a3a22,#0a1a10);flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:36px 24px;}
.order-confirm.show{display:flex;}
.confirm-icon{font-size:60px;margin-bottom:14px;}
.confirm-title{font-family:'Cinzel',serif;font-size:18px;font-weight:700;color:var(--gold-light);letter-spacing:3px;margin-bottom:8px;}
.confirm-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14.5px;color:rgba(201,168,76,0.65);line-height:1.6;margin-bottom:20px;}
.confirm-detail{background:rgba(201,168,76,0.05);border-radius:12px;padding:14px 16px;width:100%;border:1px solid rgba(201,168,76,0.18);margin-bottom:18px;text-align:left;max-height:210px;overflow-y:auto;}
.confirm-order-num{font-family:'Cinzel',serif;font-size:9.5px;letter-spacing:2px;color:var(--gold-dark);margin-bottom:7px;}
.confirm-back{background:linear-gradient(135deg,var(--gold-dark),var(--gold));color:#fff;border:none;border-radius:10px;padding:12px 32px;font-family:'Cinzel',serif;font-size:11.5px;font-weight:700;letter-spacing:2px;cursor:pointer;text-transform:uppercase;}

/* ============================================================
   ADMIN PANEL
   ============================================================ */
#adminPanel{display:none;position:fixed;inset:0;z-index:2000;background:#0d1117;font-family:'Segoe UI',system-ui,sans-serif;flex-direction:column;overflow:hidden;}
#adminPanel.visible{display:flex;}
.adm-header{background:linear-gradient(135deg,#152e1e,#1a3a22);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid rgba(201,168,76,0.18);gap:8px;}
.adm-header h1{color:var(--gold-light);font-size:15px;font-weight:700;letter-spacing:0.5px;font-family:'Cinzel',serif;display:flex;align-items:center;gap:7px;white-space:nowrap;}
.adm-hbtns{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
.ab{padding:6px 11px;border:none;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.ab-gold{background:linear-gradient(135deg,var(--gold-dark),var(--gold));color:#fff;}
.ab-gold:hover{filter:brightness(1.1);}
.ab-red{background:#ef4444;color:#fff;}
.ab-red:hover{background:#dc2626;}
.ab-green{background:#10b981;color:#fff;}
.ab-green:hover{background:#059669;}
.ab-blue{background:#3b82f6;color:#fff;}
.ab-blue:hover{background:#2563eb;}
.ab-ghost{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.75);border:1px solid rgba(255,255,255,0.15);}
.ab-ghost:hover{background:rgba(255,255,255,0.14);}
.adm-body{display:flex;flex:1;overflow:hidden;}
.adm-sidebar{width:180px;background:#080d12;flex-shrink:0;overflow-y:auto;padding:8px 0;border-right:1px solid rgba(255,255,255,0.05);}
.adm-sec-lbl{padding:9px 12px 3px;font-size:8.5px;color:rgba(255,255,255,0.22);letter-spacing:2px;text-transform:uppercase;}
.adm-cat-btn{display:flex;align-items:center;width:100%;text-align:left;padding:8px 12px;background:none;border:none;color:rgba(255,255,255,0.48);font-size:11.5px;cursor:pointer;transition:all 0.13s;border-left:3px solid transparent;gap:5px;}
.adm-cat-btn:hover{background:rgba(255,255,255,0.03);color:#fff;}
.adm-cat-btn.active{background:rgba(201,168,76,0.07);color:var(--gold-light);border-left-color:var(--gold);font-weight:600;}
.adm-cat-count{margin-left:auto;font-size:9.5px;opacity:0.35;background:rgba(255,255,255,0.07);border-radius:10px;padding:1px 5px;}
.adm-main{flex:1;overflow-y:auto;padding:12px;}
.adm-toolbar{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center;}
.adm-search{flex:1;min-width:130px;padding:7px 10px;background:#1f2937;border:1px solid rgba(255,255,255,0.09);border-radius:7px;color:#fff;font-size:12.5px;outline:none;}
.adm-search::placeholder{color:rgba(255,255,255,0.22);}
.adm-search:focus{border-color:var(--gold);}
.adm-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px;}
.adm-stat{background:#1f2937;border:1px solid rgba(255,255,255,0.06);border-radius:9px;padding:9px 10px;text-align:center;}
.adm-stat-num{font-size:18px;font-weight:700;color:var(--gold-light);}
.adm-stat-lbl{font-size:9.5px;color:rgba(255,255,255,0.3);margin-top:1px;}

/* ADMIN GRID — SQUARE CARDS */
.adm-items{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:9px;}
.adm-card{background:#1a2332;border:1px solid rgba(255,255,255,0.07);border-radius:10px;overflow:hidden;transition:border-color 0.18s;cursor:default;}
.adm-card:hover{border-color:rgba(201,168,76,0.3);}
.adm-card-img{width:100%;aspect-ratio:1/1;position:relative;background:#111827;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.adm-card-img img{width:100%;height:100%;object-fit:cover;}
.adm-card-img .ep{font-size:38px;}
.adm-img-upload{position:absolute;inset:0;background:rgba(0,0,0,0.52);display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;transition:opacity 0.18s;cursor:pointer;border:none;color:#fff;font-size:11px;gap:3px;}
.adm-card:hover .adm-img-upload{opacity:1;}
.adm-card-body{padding:9px 10px;}
.adm-card-name{color:#fff;font-size:12px;font-weight:600;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.adm-card-meta{display:flex;align-items:center;gap:6px;margin-bottom:3px;flex-wrap:wrap;}
.adm-price-badge{background:rgba(201,168,76,0.13);color:var(--gold-light);border:1px solid rgba(201,168,76,0.22);border-radius:5px;padding:2px 6px;font-size:10.5px;font-weight:700;}
.adm-badge-tag{font-size:9.5px;color:rgba(255,255,255,0.35);}
.adm-card-desc{color:rgba(255,255,255,0.3);font-size:9.5px;line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:8px;}
.adm-card-actions{display:flex;gap:4px;}
.adm-act{flex:1;padding:5px 3px;border:none;border-radius:5px;font-size:10px;font-weight:600;cursor:pointer;transition:all 0.13s;text-align:center;}
.adm-edit{background:rgba(99,102,241,0.15);color:#a5b4fc;border:1px solid rgba(99,102,241,0.22);}
.adm-edit:hover{background:rgba(99,102,241,0.28);}
.adm-hide{background:rgba(16,185,129,0.13);color:#6ee7b7;border:1px solid rgba(16,185,129,0.22);}
.adm-hide:hover{background:rgba(16,185,129,0.25);}
.adm-del{background:rgba(239,68,68,0.13);color:#fca5a5;border:1px solid rgba(239,68,68,0.18);}
.adm-del:hover{background:rgba(239,68,68,0.26);}
.adm-empty{text-align:center;padding:36px 20px;color:rgba(255,255,255,0.2);font-size:12.5px;}

/* QR / TG PANELS */
.adm-panel{background:#1a2332;border:1px solid rgba(255,255,255,0.07);border-radius:11px;padding:14px;margin-bottom:12px;}
.adm-panel h3{color:#fff;font-size:13.5px;font-weight:600;margin-bottom:12px;padding-bottom:9px;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.tg-status{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;padding:2px 9px;border-radius:20px;}
.tg-connected{background:rgba(16,185,129,0.13);color:#6ee7b7;border:1px solid rgba(16,185,129,0.28);}
.tg-disconnected{background:rgba(239,68,68,0.13);color:#fca5a5;border:1px solid rgba(239,68,68,0.18);}
.adm-field{margin-bottom:10px;}
.adm-field label{display:block;color:rgba(255,255,255,0.4);font-size:10.5px;font-weight:600;letter-spacing:0.4px;margin-bottom:3px;text-transform:uppercase;}
.adm-field input,.adm-field textarea,.adm-field select{width:100%;padding:7px 10px;background:#0d1117;border:1px solid rgba(255,255,255,0.1);border-radius:7px;color:#fff;font-size:12.5px;outline:none;transition:border-color 0.18s;}
.adm-field input:focus,.adm-field textarea:focus,.adm-field select:focus{border-color:var(--gold);}
.adm-field textarea{resize:vertical;min-height:55px;font-family:inherit;}
.adm-field select option{background:#1f2937;}
.adm-row2{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.tg-info{background:rgba(59,130,246,0.08);border:1px solid rgba(59,130,246,0.2);border-radius:8px;padding:11px;font-size:11.5px;color:rgba(255,255,255,0.6);line-height:1.65;margin-bottom:11px;}
.tg-info code{background:rgba(255,255,255,0.09);padding:1px 5px;border-radius:4px;font-size:10.5px;color:#93c5fd;}
.qr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:12px;padding:2px 0;}
.qr-card{background:#1a2332;border:1px solid rgba(255,255,255,0.07);border-radius:11px;padding:14px;text-align:center;}
.qr-card h4{color:#fff;font-size:12.5px;font-weight:600;margin-bottom:3px;}
.qr-card p{color:rgba(255,255,255,0.35);font-size:9.5px;margin-bottom:11px;word-break:break-all;}
.qr-box{background:#fff;border-radius:7px;padding:8px;display:inline-block;margin-bottom:9px;}
.qr-card-btns{display:flex;gap:5px;justify-content:center;}

/* ADMIN MODAL */
.adm-modal-wrap{display:none;position:fixed;inset:0;z-index:3000;background:rgba(0,0,0,0.78);align-items:center;justify-content:center;padding:14px;}
.adm-modal-wrap.open{display:flex;}
.adm-modal{background:#1a2332;border:1px solid rgba(255,255,255,0.1);border-radius:13px;padding:18px;width:min(440px,100%);max-height:90vh;overflow-y:auto;}
.adm-modal h3{color:#fff;font-size:15px;font-weight:700;margin-bottom:14px;padding-bottom:9px;border-bottom:1px solid rgba(255,255,255,0.07);}
.adm-modal-btns{display:flex;gap:6px;margin-top:14px;}
.emoji-picker{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;}
.ep-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:6px;padding:4px 5px;font-size:17px;cursor:pointer;transition:all 0.13s;}
.ep-btn:hover,.ep-btn.sel{background:rgba(201,168,76,0.18);border-color:var(--gold);}
.badge-picker{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;}
.bp-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:20px;padding:3px 8px;font-size:9.5px;color:rgba(255,255,255,0.65);cursor:pointer;transition:all 0.13s;}
.bp-btn:hover{background:rgba(201,168,76,0.16);border-color:var(--gold);color:var(--gold-light);}
.img-preview{width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:8px;border:1px solid rgba(255,255,255,0.09);margin-top:6px;display:none;}
.img-preview.show{display:block;}

/* Toggle switch */
.adm-toggle{width:40px;height:22px;background:rgba(255,255,255,0.1);border:none;border-radius:11px;cursor:pointer;position:relative;transition:background 0.2s;flex-shrink:0;}
.adm-toggle.on{background:#10b981;}
.adm-toggle::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform 0.2s;}
.adm-toggle.on::after{transform:translateX(18px);}

@media(max-width:360px){.items-grid{grid-template-columns:1fr;}.adm-items{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));}}
</style>
</head>

// URL table detect
function detectTable(){
  const t=new URLSearchParams(window.location.search).get('table');
  if(t){
    currentTable=decodeURIComponent(t);
    document.getElementById('heroTableTxt').textContent=currentTable;
    document.getElementById('heroTable').style.display='inline-flex';
    const tag=document.getElementById('cartTableTag');
    tag.textContent='🪑 '+currentTable;tag.style.display='block';
  }
}

// ========================================
// CUSTOMER VIEW BUILD
// ========================================
function ea(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function da(item){return ea(JSON.stringify(item));}

function buildCustomerView(){
  const nav=document.getElementById('navScroll');
  const content=document.getElementById('mainContent');
  nav.innerHTML='';content.innerHTML='';
  Object.keys(MENU).forEach((key,i)=>{
    const cat=MENU[key];
    const btn=document.createElement('button');
    btn.className='nav-btn'+(i===0?' active':'');
    btn.textContent=cat.label;
    btn.onclick=()=>showSec(key,btn);
    nav.appendChild(btn);
    const sec=document.createElement('div');
    sec.className='section'+(i===0?' active':'');
    sec.id='sec-'+key;
    const icon=(cat.label.match(/^(\S+)/)||['🍽️'])[1];
    const name=cat.label.replace(/^\S+\s*/,'');
    sec.innerHTML='<div class="sec-head"><span class="sec-head-icon">'+icon+'</span><div class="sec-head-title">'+name+'</div></div>';
    const visible=cat.items.filter(it=>!it.hidden);
    const g=document.createElement('div');g.className='items-grid';
    visible.forEach(it=>{g.innerHTML+=gridCardHTML(it);});
    sec.appendChild(g);
    content.appendChild(sec);
  });
}

function gridCardHTML(item){
  const badge=item.badge?'<div class="item-badge">'+item.badge+'</div>':'';
  const imgContent=item.img
    ?'<img class="item-card-img" src="'+item.img+'" alt="'+ea(item.name)+'" loading="lazy">'
    :'<div class="item-card-emoji">'+ea(item.emoji||'🍽️')+'</div>';

// CART
function addToCart(item){
  const ex=cart.find(c=>c.id===item.id);
  ex?ex.qty++:cart.push({...item,qty:1});
  updateCartUI();showToast('✓ '+item.name+' əlavə edildi');
}
function updateCartUI(){
  document.getElementById('cartCount').textContent=cart.reduce((s,i)=>s+i.qty,0);
  renderCart();
}
function renderCart(){
  const el=document.getElementById('cartItems');
  const footer=document.getElementById('cartFooter');
  if(!cart.length){el.innerHTML='<div class="cart-empty">Səbət boşdur 🛒<br><small style="font-size:12px;margin-top:5px;display:block">Xoşunuza gələn yeməkləri əlavə edin</small></div>';footer.style.display='none';return;}
  footer.style.display='block';
  let total=0;
  el.innerHTML=cart.map(item=>{
    const s=item.price*item.qty;total+=s;
    const th=item.img?'<img src="'+item.img+'" style="width:100%;height:100%;object-fit:cover">':'<div class="em">'+item.emoji+'</div>';
    return '<div class="cart-item"><div class="cart-item-thumb">'+th+'</div><div class="cart-item-name">'+ea(item.name)+'<div class="cart-item-sub">'+item.price+' ₼ × '+item.qty+'</div></div><div class="qty-ctrl"><button class="qty-btn" onclick="changeQty(\''+item.id+'\',-1)">−</button><span class="qty-num">'+item.qty+'</span><button class="qty-btn" onclick="changeQty(\''+item.id+'\',1)">+</button></div><div class="cart-item-price">'+s.toFixed(2)+' ₼</div></div>';
  }).join('');
  document.getElementById('cartTotal').textContent=total.toFixed(2)+' ₼';
}
function changeQty(id,d){
  const i=cart.findIndex(c=>c.id===id);if(i===-1)return;
  cart[i].qty+=d;if(cart[i].qty<=0)cart.splice(i,1);
  updateCartUI();
}
function openCart(){document.getElementById('cartOverlay').classList.add('open');document.getElementById('cartDrawer').classList.add('open');renderCart();}
function closeCart(){document.getElementById('cartOverlay').classList.remove('open');document.getElementById('cartDrawer').classList.remove('open');}

// PLACE ORDER
async function placeOrder(){
  if(!cart.length)return;
  const btn=document.getElementById('orderBtn');
  btn.disabled=true;btn.textContent='Göndərilir...';
  const total=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const num='CM-'+Math.floor(1000+Math.random()*9000);
  const note=document.getElementById('cartNote').value.trim();
  const tblStr=currentTable||'Masa məlum deyil';
  const lines=cart.map(i=>'  • '+i.name+' ×'+i.qty+' = '+(i.price*i.qty).toFixed(2)+' ₼').join('\n');
  const tgMsg='🍽️ *YENİ SİFARİŞ*\n'+'━━━━━━━━━━━━━━━\n'+'🪑 *'+tblStr+'*\n'+'📋 *№:* \n'+'━━━━━━━━━━━━━━━\n'+lines+'\n'+'━━━━━━━━━━━━━━━\n'+'💰 *Cəmi: '+total.toFixed(2)+' ₼*'+(note?'\n📝 '+note:'');
  let tgOk=false;
  if(TG.enabled&&TG.token&&TG.chatId){
    try{const r=await fetch('https://api.telegram.org/bot'+TG.token+'/sendMessage',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:TG.chatId,text:tgMsg,parse_mode:'Markdown'})});const j=await r.json();tgOk=j.ok;}catch(e){}
  }
  document.getElementById('confirmSub').textContent='Sifarişiniz qeydə alındı.'+(tgOk?' 📲 Bildiriş göndərildi.':'');
  document.getElementById('confirmDetail').innerHTML=
    '<div class="confirm-order-num">SİFARİŞ № '+num+'</div>'+
    '<div style="font-size:11.5px;color:rgba(201,168,76,0.65);font-family:Cinzel,serif;letter-spacing:1px;margin-bottom:7px">🪑 '+tblStr+'</div>'+
    cart.map(i=>'<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(201,168,76,0.08);font-size:12.5px"><span style="color:rgba(255,255,255,0.78)">'+i.emoji+' '+i.name+' ×'+i.qty+'</span><span style="font-family:Cinzel,serif;font-weight:700;color:var(--gold-light)">'+(i.price*i.qty).toFixed(2)+' ₼</span></div>').join('')+
    '<div style="display:flex;justify-content:space-between;padding:9px 0 0;font-family:Cinzel,serif;font-weight:700;font-size:13.5px"><span style="color:#fff">CƏMİ</span><span style="color:var(--gold-light)">'+total.toFixed(2)+' ₼</span></div>';
  closeCart();
  document.getElementById('orderConfirm').classList.add('show');
  cart=[];updateCartUI();
  btn.disabled=false;btn.textContent='SİFARİŞ VER ✓';
}
function backToMenu(){document.getElementById('orderConfirm').classList.remove('show');}

function openModal(el){

  const wrap=document.getElementById('modalImgWrap');

function triggerItemImg(catKey,itemId){imgEditCat=catKey;imgEditId=itemId;document.getElementById('imgInput').click();}
function handleImgUpload(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    const cat=MENU[imgEditCat];if(!cat)return;

function selEmoji(e,btn){document.getElementById('admEI').value=e;btn.closest('.emoji-picker').querySelectorAll('.ep-btn').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');}
function previewAdmImg(input){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();r.onload=ev=>{const p=document.getElementById('admIP');p.src=ev.target.result;p.classList.add('show');p.dataset.newimg=ev.target.result;};r.readAsDataURL(f);
}
function saveItem(editId){
  const name=document.getElementById('admNI').value.trim();
  const price=parseFloat(document.getElementById('admPI').value);
  const desc=document.getElementById('admDI').value.trim();
  const emoji=document.getElementById('admEI').value.trim()||'🍽️';
  const badge=document.getElementById('admBI').value.trim();
  const ip=document.getElementById('admIP');
  const newImg=ip&&ip.dataset.newimg?ip.dataset.newimg:null;
  if(!name){alert('Ad daxil edin!');return;}
  if(isNaN(price)||price<0){alert('Düzgün qiymət daxil edin!');return;}
  const cat=MENU[admCat];
  if(editId){
    const i=cat.items.findIndex(x=>x.id===editId);
    if(i!==-1){const old=cat.items[i];cat.items[i]={...old,name,price,desc:desc||undefined,emoji,badge:badge||undefined,img:newImg||old.img||undefined};}
  } else {
    cat.items.push({id:admCat+'_'+Date.now(),name,price,desc:desc||undefined,emoji,badge:badge||undefined,img:newImg||undefined});
  }
  saveMenu();buildCustomerView();closeAdmModal();renderItems();buildAdmSidebar();showToast(editId?'✓ Yeniləndi':'✓ Əlavə edildi');
}
function delItem(id){
  if(!confirm('Silmək istəyirsiniz?'))return;
  MENU[admCat].items=MENU[admCat].items.filter(i=>i.id!==id);
  saveMenu();buildCustomerView();renderItems();buildAdmSidebar();showToast('🗑️ Silindi');
}
function toggleHide(id){
  const item=MENU[admCat].items.find(i=>i.id===id);
  if(item){item.hidden=!item.hidden;saveMenu();buildCustomerView();renderItems();}
}

  const tok=document.getElementById('tgTok').value.trim();const chat=document.getElementById('tgChat').value.trim();
  if(!tok||!chat){alert('Token və Chat ID daxil edin!');return;}
  try{const r=await fetch('https://api.telegram.org/bot'+tok+'/sendMessage',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:chat,text:'✅ Chef Muslim Restaurant\nTelegram bağlantısı uğurla quruldu!'})});const j=await r.json();j.ok?showToast('✅ Test mesajı göndərildi!'):alert('Xəta: '+j.description);}catch(e){alert('Xəta: '+e.message);}
}

// QR view
function renderQR(){
  const main=document.getElementById('admMain');
  main.innerHTML='<div class="adm-panel" style="margin-bottom:12px"><h3>⚙️ Masa Ayarları</h3>'+
    '<div class="adm-row2"><div class="adm-field"><label>Masa Sayı</label><input id="tcI" type="number" min="1" max="50" value="'+TABLES.count+'"></div><div class="adm-field"><label>Masa Prefiksi</label><input id="tpI" value="'+ea(TABLES.prefix)+'"></div></div>'+
    '<div class="adm-modal-btns"><button class="ab ab-gold" onclick="saveTablesConf()">💾 Yadda Saxla & Yenilə</button></div></div>'+
    '<div class="qr-grid" id="qrGrid"></div>';
  renderQRCards();
}
function saveTablesConf(){TABLES.count=parseInt(document.getElementById('tcI').value)||5;TABLES.prefix=document.getElementById('tpI').value.trim()||'Masa';saveTables();renderQR();showToast('✓ Masa ayarları yeniləndi');}
function renderQRCards(){
  const grid=document.getElementById('qrGrid');if(!grid)return;
  grid.innerHTML='';
  const base=window.location.href.split('?')[0];
  for(let i=1;i<=TABLES.count;i++){
    const label=TABLES.prefix+' '+i;
    const url=base+'?table='+encodeURIComponent(label);
    const card=document.createElement('div');card.className='qr-card';
    const short=url.length>48?url.substring(0,48)+'…':url;
    card.innerHTML='<h4>🪑 '+label+'</h4><p>'+ea(short)+'</p><div class="qr-box" id="qr-'+i+'"></div><div class="qr-card-btns"><button class="ab ab-ghost" style="font-size:10px" onclick="dlQR('+i+')">⬇️ PNG</button><button class="ab ab-blue" style="font-size:10px" onclick="copyURL(\''+ea(url)+'\')">🔗 Link</button></div>';
    grid.appendChild(card);
    setTimeout(()=>{
      const box=document.getElementById('qr-'+i);
      if(box&&typeof QRCode!=='undefined'){box.innerHTML='';new QRCode(box,{text:url,width:116,height:116,colorDark:'#1a3a22',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H});}
    },80+i*20);
  }
}
function dlQR(num){
  const box=document.getElementById('qr-'+num);if(!box)return;
  const canvas=box.querySelector('canvas');if(!canvas){alert('QR tapılmadı');return;}
  const a=document.createElement('a');a.download='masa-'+num+'.png';a.href=canvas.toDataURL('image/png');a.click();
}
function copyURL(url){navigator.clipboard.writeText(url).then(()=>showToast('🔗 Link kopyalandı!')).catch(()=>showToast('❌ Kopyalama xətası'));}

// Export/Import
function exportJSON(){
  const blob=new Blob([JSON.stringify({menu:MENU,tg:TG,tables:TABLES},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='chef-muslim-data.json';a.click();showToast('✓ Eksport edildi');
}
function triggerImport(){document.getElementById('importInput').click();}
function handleImport(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=ev=>{
    try{const d=JSON.parse(ev.target.result);if(d.menu){MENU=d.menu;saveMenu();}if(d.tg){TG=d.tg;saveTg();}if(d.tables){TABLES=d.tables;saveTables();}buildCustomerView();selectCat(Object.keys(MENU)[0]);showToast('✓ İdxal edildi');}catch(err){alert('Fayl düzgün deyil!');}
  };r.readAsText(f);e.target.value='';
}

// Admin URL access
function checkAdmin(){if(new URLSearchParams(window.location.search).get('admin')==='1')openAdmin();}

// INIT
buildCustomerView();detectTable();checkAdmin();
</script>
